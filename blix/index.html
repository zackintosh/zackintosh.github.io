<title>BLiX</title>
<style>

    --field:#caa6b6;

  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;}

       color:#e8ecf5;user-select:none;-webkit-user-select:none;}
  #cv{display:block;width:100vw;height:100vh;cursor:pointer;touch-action:none;}
  .hud{position:fixed;left:0;right:0;pointer-events:none;display:flex;flex-direction:column;align-items:center;z-index:5;}
  .top{top:0;padding:16px 16px 0;} .bottom{bottom:0;padding:0 16px 18px;}
  h1{font-size:clamp(20px,3.6vw,30px);font-weight:700;letter-spacing:1px;text-shadow:0 2px 18px rgba(0,0,0,.6);}
  h1 .x{color:var(--neon);text-shadow:0 0 14px var(--neon);}
  #status{margin-top:10px;font-size:clamp(14px,2.6vw,18px);font-weight:600;min-height:22px;
          padding:6px 18px;border-radius:999px;background:rgba(255,255,255,.06);backdrop-filter:blur(8px);
          border:1px solid rgba(255,255,255,.08);transition:color .2s;text-align:center;}
  #hint{margin-top:7px;font-size:12px;opacity:.65;min-height:15px;letter-spacing:.5px;}
  .controls{display:flex;gap:9px;pointer-events:auto;flex-wrap:wrap;justify-content:center;}
  button{pointer-events:auto;cursor:pointer;font:inherit;font-weight:600;font-size:13.5px;color:#e8ecf5;
         padding:9px 15px;border-radius:11px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
         backdrop-filter:blur(8px);transition:all .15s ease;}
  button:hover{background:rgba(255,255,255,.15);transform:translateY(-1px);}
  button:active{transform:translateY(0);}
  button.active{background:rgba(120,180,255,.24);border-color:#7ab4ff;color:#fff;}
  #ov{position:fixed;inset:0;display:none;place-items:center;background:rgba(6,8,16,.55);backdrop-filter:blur(3px);z-index:10;}
  #ov .panel{background:rgba(24,28,44,.96);border:1px solid rgba(255,255,255,.14);border-radius:16px;
             padding:22px 26px;text-align:center;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.55);
             max-height:88vh;overflow-y:auto;}
  #ov h2{font-size:23px;font-weight:700;margin-bottom:8px;letter-spacing:.5px;}
  #ov h3{font-size:15px;font-weight:600;margin-bottom:14px;opacity:.85;}
  #ov p{font-size:13px;opacity:.72;line-height:1.5;margin-bottom:14px;}
  #ov p.code b{color:var(--neon);font-size:20px;letter-spacing:3px;}
  #ov .row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  #ov input{font:inherit;font-size:20px;font-weight:700;letter-spacing:5px;text-transform:lowercase;width:170px;
            text-align:center;padding:8px 10px;border-radius:10px;margin-bottom:12px;background:rgba(255,255,255,.08);
            border:1px solid rgba(255,255,255,.18);color:#fff;}
  #ov .err2{color:var(--danger);font-size:12.5px;min-height:16px;margin-top:8px;}
  #ov .help{list-style:none;text-align:left;margin:2px 0 16px;display:flex;flex-direction:column;gap:11px;}
  #ov .help li{display:flex;gap:12px;align-items:flex-start;font-size:13px;line-height:1.4;color:rgba(255,255,255,.78);}
  #ov .help .ic{flex:0 0 28px;width:28px;height:28px;display:grid;place-items:center;font-size:17px;font-weight:800;

  #ov .help b{color:#fff;font-weight:700;}
</style>

  const slot = (x,y)=>(x>=1&&x<=COLS&&y>=1&&y<=26)?SL[SI(x,y)]:null;
  const setSlot = (x,y,v)=>{ if(x>=1&&x<=COLS&&y>=1&&y<=26) SL[SI(x,y)]=v; };

  const G = {
    state:'menu', level:0, balls:[], ballsLeft:0, cups:[], teles:[],
    wrap:0, timerSpeed:125, timerVar:0, supply:SUPPLY, placed:0,
    cell:36, originX:0, originY:0, hover:null, fx:[], flash:null,
    introT:0, showCode:false, showHelp:false, sound:true, maxLevel:0, won:false, lost:false,
    score:0, bonus:null, winBonus:0,        // score = 0..99999 odometer; bonus = end-of-level count-up anim
  };
  let NOW=0;

  /* ============================ Level loading ============================ */
  function clearGrid(){ for(let i=0;i<SL.length;i++) SL[i]=null; }

  function decodeAndPlace(gx, gy, code){
    const c = code;
    if(c.slice(0,2)==='ba'){
      const dir = {u:'U',d:'D',l:'L',r:'R'}[c[2]] || 'R';
      const sp  = parseInt(c[3])||2;
      spawnBall(gx, gy, dir, sp);
      return;
    }
    if(c.slice(0,2)==='cp'){
      const face = {u:1,r:2,d:3,l:4}[c[2]] || 1;        // 1=Up 2=Right 3=Down 4=Left
      const beh  = parseInt(c[3])||0;                    // 0 static, 1 rotate CW, 2 rotate CCW
      const cup = {t:'cup', face, beh, rotT:0, gx, gy};
      G.cups.push(cup);
      setSlot(gx, 2*gy-1, cup); setSlot(gx, 2*gy, cup);
      return;
    }
    if(c.slice(0,3)==='blk'){
      const blk={t:'block', br:(parseInt(c[3])||0)===1};
      setSlot(gx, 2*gy-1, blk); setSlot(gx, 2*gy, blk);
      return;
    }
    if(['stik','tele','invs','redi','spdu','spdd'].includes(c)){
      const it={t:'item', it:c, gx, gy};
      setSlot(gx, 2*gy-1, it); setSlot(gx, 2*gy, it);
      if(c==='tele') G.teles.push([gx,gy]);
      return;
    }
    // developer bumpers / walls — chars 1-2 give x(LT)/z(LB); chars 3-4 give w(RT)/y(RB)
    if(c[0]==='x') setSlot(gx, 2*gy-1, {t:'bumper', shape:'LT', perm:(c[1]==='0')});
    else if(c[0]==='z') setSlot(gx, 2*gy, {t:'bumper', shape:'LB', perm:(c[1]==='0')});
    if(c[2]==='w') setSlot(gx, 2*gy-1, {t:'bumper', shape:'RT', perm:(c[3]==='0')});
    else if(c[2]==='y') setSlot(gx, 2*gy, {t:'bumper', shape:'RB', perm:(c[3]==='0')});
  }

  function spawnBall(gx, gy, dir, sp){
    G.balls.push({ x:(gx-1)*U+12, y:(gy-1)*U+12, dir, sp, st:'move', stT:0,
                   col:BALLCOL[G.balls.length%BALLCOL.length], alive:true });
    G.ballsLeft++;
  }

  /* ============================ Scoring (ported from Obj:Balls.getscore + MainTimer.timerbonus) ============================ */
  // Each captured ball and each leftover timer step is worth floor((level-1)/10)+1 points:
  // 1 pt on levels 1-10, 2 pts on 11-20, 3 pts on 21-30 ... mirroring the original (gstage-1)/10+1.
  function levelPoints(){ return Math.floor(G.level/10)+1; }
  function setScore(v){ G.score=Math.max(0,Math.min(99999,v|0)); try{localStorage.setItem('blix.score',String(G.score));}catch(e){} }
  function addScore(n){ setScore(G.score+n); }
  function timerStepsLeft(){ return Math.max(0, Math.min(13, 13 - Math.floor(G.timerVar/G.timerSpeed))); }

  function loadLevel(i){
    i=Math.max(0,Math.min(LEVELS.length-1,i));
    G.level=i; try{localStorage.setItem('blix.cur',String(i));}catch(e){}   // remember the level we're on, so refresh/Start resume here
    const lv=LEVELS[i];
    clearGrid(); G.balls=[]; G.ballsLeft=0; G.cups=[]; G.teles=[];
    G.bonus=null;                                                          // cancel any in-progress timer-bonus tally
    G.wrap=lv.w||0; G.timerSpeed=lv.t||125; G.timerVar=0;
    G.supply=SUPPLY; G.placed=0; G.fx=[]; G.flash=null;
    G.won=false; G.lost=false; G.introT=performance.now();
    for(const [x,y,code] of lv.o) decodeAndPlace(x,y,code);
    G.state='playing'; G.showCode=false; G.showHelp=false;
    updateStatus();
  }
  function startGame(){ let c=0; try{const v=parseInt(localStorage.getItem('blix.cur'),10); if(!isNaN(v)) c=v;}catch(e){} loadLevel(c); }
  function nextLevel(){ const n=G.level+1; setMax(n); if(n>=LEVELS.length){ winGame(); } else loadLevel(n); }
  function winGame(){ G.state='menu'; G.showCode=false; updateStatus(); }
  function gotoMenu(){ G.state='menu'; G.showCode=false; updateStatus(); }
  function winLevel(){ G.state='win'; G.won=true; setMax(G.level+1);
    const steps=timerStepsLeft(), per=levelPoints();                       // leftover time converts to bonus points
    G.winBonus=steps*per; G.bonus = steps>0 ? {steps, per, acc:0} : null;
    Sound.win(); updateStatus(); }
  function loseLevel(){ G.state='lose'; G.lost=true; Sound.lose(); updateStatus(); }
  function togglePause(){ if(G.state==='playing'){G.state='paused';} else if(G.state==='paused'){G.state='playing';} updateStatus(); }
  function setMax(n){ if(n>G.maxLevel){ G.maxLevel=n; try{localStorage.setItem('blix.max',String(n));}catch(e){} } }
  function setSound(on){ G.sound=on; try{localStorage.setItem('blix.sound',on?'1':'0');}catch(e){} if(on)Sound.init(); updateStatus(); }

  /* ============================ Ball physics (ported) ============================ */
  function checkballloc(bx, by, dir){
    const mx=((bx%U)+U)%U, my=((by%U)+U)%U;
    if(mx===12 && my===12) return 'center';
    if(mx===12 && my===6  && dir==='U') return 'edgetop';
    if(mx===12 && my===18 && dir==='D') return 'edgebottom';
    if(mx===18 && my===12 && dir==='R') return 'edgeright';
    if(mx===6  && my===12 && dir==='L') return 'edgeleft';
    return null;
  }
  function reverse(b){ b.dir=OPP[b.dir]; Sound.bounce(); fx(b.x,b.y,b.col,2); }

  function captureBall(b, cup){
    b.alive=false; G.ballsLeft--; Sound.score();
    addScore(levelPoints());                          // each ball into a cup scores floor((level-1)/10)+1
    if(cup) cup.flashT=NOW;                            // flash the cup gold on the catch
    fx(b.x, b.y, COL.cup, 12);
    if(G.ballsLeft<=0 && !G.lost){ winLevel(); }
  }

  function doItem(b, it){
    switch(it){
      case 'stik': if(b.st==='move'){ b.st='stik'; b.stT=NOW+STIK_MS; Sound.special(); } break;
      case 'invs': if(b.st==='move'){ b.st='invs'; b.stT=NOW+INVS_MS; Sound.special(); } break;
      case 'spdu': b.sp=SPDU[b.sp]||b.sp; Sound.special(); break;
      case 'spdd': b.sp=SPDD[b.sp]||b.sp; Sound.special(); break;
      case 'redi': { const opts=['U','D','L','R'].filter(d=>d!==b.dir); b.dir=opts[(Math.random()*3)|0]; Sound.special(); break; }
      case 'tele': {
        const cur=[Math.floor(b.x/U)+1, Math.floor(b.y/U)+1];
        const other=G.teles.find(t=>t[0]!==cur[0]||t[1]!==cur[1]);
        if(other){ b.x=(other[0]-1)*U+12; b.y=(other[1]-1)*U+12; Sound.special(); }
        break;
      }
    }
  }

  function checkcenter(b, gx, gy){
    const top=slot(gx,2*gy-1), bot=slot(gx,2*gy);
    const o = top || bot, sy = top?2*gy-1:2*gy;
    if(!o) return;
    if(o.t==='cup'){ captureBall(b, o); return; }
    if(o.t==='item'){ doItem(b,o.it); return; }
    if(o.t==='bumper'){
      const turn=TURN[o.shape][b.dir];
      if(turn) b.dir=turn;
      Sound.bounce(); fx(b.x,b.y,COL.neon,3);
      if(!o.perm){ setSlot(gx,sy,null); G.placed=Math.max(0,G.placed-1); }
    }
  }

  // edge helpers: neighbor object reverses the ball (and player/dev2 bumper is consumed)
  function bumpHit(b, x, y, o){
    reverse(b);
    if(!o.perm){ setSlot(x,y,null); G.placed=Math.max(0,G.placed-1); }
  }
  function breakBlock(x, y, o){ if(o.br){ setSlot(x,2*Math.ceil(y/2)-1,null); setSlot(x,2*Math.ceil(y/2),null); } }

  function checkedgeleft(b, gx, gy){           // moving L, neighbor gx-1
    const nx=gx-1, top=slot(nx,2*gy-1), bot=slot(nx,2*gy);
    if(top){ if(top.t==='cup'){ if(top.face!==2) reverse(b); }
      else if(top.t==='bumper'){ if(top.shape==='RT') bumpHit(b,nx,2*gy-1,top); }
      else if(top.t==='block'){ breakBlock(nx,2*gy-1,top); reverse(b); } }
    if(bot && bot.t==='bumper' && bot.shape==='RB') bumpHit(b,nx,2*gy,bot);
  }
  function checkedgeright(b, gx, gy){          // moving R, neighbor gx+1
    const nx=gx+1, top=slot(nx,2*gy-1), bot=slot(nx,2*gy);
    if(top){ if(top.t==='cup'){ if(top.face!==4) reverse(b); }
      else if(top.t==='bumper'){ if(top.shape==='LT') bumpHit(b,nx,2*gy-1,top); }
      else if(top.t==='block'){ breakBlock(nx,2*gy-1,top); reverse(b); } }
    if(bot && bot.t==='bumper' && bot.shape==='LB') bumpHit(b,nx,2*gy,bot);
  }
  function checkedgetop(b, gx, gy){            // moving U, bottom slot of cell above
    const o=slot(gx, 2*gy-2); if(!o) return;
    if(o.t==='cup'){ if(o.face!==3) reverse(b); }
    else if(o.t==='bumper'){ bumpHit(b,gx,2*gy-2,o); }
    else if(o.t==='block'){ breakBlock(gx,2*gy-2,o); reverse(b); }
  }
  function checkedgebottom(b, gx, gy){         // moving D, top slot of cell below
    const o=slot(gx, 2*gy+1); if(!o) return;
    if(o.t==='cup'){ if(o.face!==1) reverse(b); }
    else if(o.t==='bumper'){ bumpHit(b,gx,2*gy+1,o); }
    else if(o.t==='block'){ breakBlock(gx,2*gy+1,o); reverse(b); }
  }

  function wrapEdge(b, side){                  // astro mode: wrap to opposite edge
    if(side==='top') b.y += 12*U;
    else if(side==='bottom') b.y -= 12*U;
    else if(side==='left') b.x += 12*U;
    else if(side==='right') b.x -= 12*U;
  }

  function animteOne(b){
    const gx=Math.floor(b.x/U)+1, gy=Math.floor(b.y/U)+1;
    const loc=checkballloc(b.x, b.y, b.dir);
    switch(loc){
      case 'center': checkcenter(b,gx,gy); break;
      case 'edgetop': if(gy===1){ G.wrap?wrapEdge(b,'top'):reverse(b); } else checkedgetop(b,gx,gy); break;
      case 'edgebottom': if(gy===ROWS){ G.wrap?wrapEdge(b,'bottom'):reverse(b); } else checkedgebottom(b,gx,gy); break;
      case 'edgeright': if(gx===COLS){ G.wrap?wrapEdge(b,'right'):reverse(b); } else checkedgeright(b,gx,gy); break;
      case 'edgeleft': if(gx===1){ G.wrap?wrapEdge(b,'left'):reverse(b); } else checkedgeleft(b,gx,gy); break;
    }
    if(!b.alive) return;
    if(b.st==='stik') return;                  // got stuck this step: don't move
    const [dx,dy]=DV[b.dir]; b.x+=dx; b.y+=dy;  // movemyball (1 unit)
  }

  function stepBall(b){
    if(b.st==='stik'){ if(NOW<b.stT) return;                 // still stuck this tick
      b.st='move'; const [dx,dy]=DV[b.dir]; b.x+=dx; b.y+=dy; }  // release: step off the sticky cell so checkcenter can't re-stick it
    if(b.st==='invs' && NOW>=b.stT) b.st='move';
    for(let s=0;s<b.sp;s++){ animteOne(b); if(!b.alive||b.st==='stik') return; }
  }

  /* ============================ Per-frame tick ============================ */
  function tickFrame(){
    if(G.state!=='playing') return;
    G.timerVar++;
    // cups that rotate (behavior 1 = CW, 2 = CCW): one face-step every ~10s, per the original
    for(const c of G.cups){ if(c.beh===1||c.beh===2){ c.rotT++; if(c.rotT*FRAME_MS>=CUPROT_MS){ c.rotT=0;
      c.face = c.beh===1 ? (c.face%4)+1 : ((c.face+2)%4)+1; } } }
    for(const b of G.balls){ if(b.alive) stepBall(b); if(G.state!=='playing') return; }
    // ring timer
    if(ringFrac()>=1 && !G.won){ loseLevel(); }
  }
  function ringFrac(){ return G.timerVar / (13*G.timerSpeed); }
  // Drain leftover timer into score after a win, one step at a time (mirrors MainTimer.timerbonus).
  function tickBonus(dt){ const b=G.bonus; if(!b) return; b.acc+=dt;
    while(b.acc>=BONUS_MS && b.steps>0){ b.acc-=BONUS_MS; b.steps--; addScore(b.per); }
    if(b.steps<=0) G.bonus=null; }

  /* ============================ Rendering ============================ */
  const cv=document.getElementById('cv'); const ctx=cv.getContext('2d');
  let lastW=0,lastH=0,lastDpr=0, fieldPattern=null, tileCell=0, tileField='', tileDpr=0, hudTopH=130, hudBotH=64;
  function resize(){
    const dpr=Math.min(window.devicePixelRatio||1,2), w=window.innerWidth, h=window.innerHeight;
    if(w!==lastW||h!==lastH||dpr!==lastDpr){ cv.width=Math.floor(w*dpr); cv.height=Math.floor(h*dpr);
      ctx.setTransform(dpr,0,0,dpr,0,0); lastW=w;lastH=h;lastDpr=dpr;
      const te=document.querySelector('.hud.top'), be=document.querySelector('.hud.bottom');   // measure HUDs only on resize
      if(te) hudTopH=te.getBoundingClientRect().height; if(be) hudBotH=be.getBoundingClientRect().height; }
    const topR=hudTopH+24, botR=hudBotH+12, meterAllow=1.2;            // reserve top/bottom HUDs (extra gap up top so the password isn't flush with the board); framed strip extends ~1.2 cell below the board
    const availH=Math.max(140, h-topR-botR);                          // vertical room for the board + meter strip
    G.cell=Math.floor(Math.min(w*0.92/COLS, availH/(ROWS+meterAllow)));
    G.originX=Math.round((w-G.cell*COLS)/2);
    G.originY=Math.round(topR + (availH - G.cell*(ROWS+meterAllow))/2);   // centre board+meters in the space below the top HUD
    buildFieldTile();
  }
  const SCx = u => G.originX + u*(G.cell/U);     // field-unit -> screen px
  const SCy = u => G.originY + u*(G.cell/U);
  function fx(ux,uy,color,n){ for(let k=0;k<(n||4);k++) G.fx.push({x:ux,y:uy,t0:NOW,life:320,color});
    if(G.fx.length>240) G.fx.splice(0,G.fx.length-240); }
  function rrect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
  function pickCell(px,py){ const c=Math.floor((px-G.originX)/G.cell), r=Math.floor((py-G.originY)/G.cell);
    return (c>=0&&c<COLS&&r>=0&&r<ROWS)?[c,r]:null; }

  // the mauve dotted field texture: a 2×2-cell repeating tile. dotted L-brackets appear only in
  // the corners that can actually take a deflector — a checkerboard (see hoverShape parity rule).
  function buildFieldTile(){
    const fc=fieldCol(), D=Math.min(window.devicePixelRatio||1,2);
    if(G.cell===tileCell && fc===tileField && D===tileDpr && fieldPattern) return;
    tileCell=G.cell; tileField=fc; tileDpr=D;
    const s=G.cell, T=s*2;                           // tile spans 2×2 cells to capture the placement checkerboard
    // build at DEVICE resolution and snap dots to the device-pixel grid so they stay crisp at any dpr/cell size
    const t=document.createElement('canvas'); t.width=Math.round(T*D); t.height=Math.round(T*D); const c=t.getContext('2d');
    if(!c){ fieldPattern=null; return; }
    c.scale(D,D);                                    // author in CSS units, render at device resolution
    c.fillStyle=fc; c.fillRect(0,0,T,T);
    const step=Math.max(2,Math.round(s/18));         // dot spacing
    const m=s*0.12, armLen=s*0.56;                   // match drawBumper: kink inset, arm length
    const nLen=Math.floor(armLen/step), nW=1;        // arm runs the full deflector length, exactly 3 dots (2*nW+1) wide
    const dotSz=Math.max(1,Math.round(D))/D;         // ~1 device-px block — crisp, never sub-pixel
    const TL=[0,0,1,1], TR=[s,0,-1,1], BL=[0,s,1,-1], BR=[s,s,-1,-1];   // corner geometry (cell-local)
    const cellTex=(ox,oy,corners,diag)=>{            // diag: 'main' (TL-BR) or 'anti' (TR-BL) — the one through the EMPTY corners
      c.save(); c.translate(ox,oy);
      const dot=(x,y)=>{ if(x>=0&&x<s&&y>=0&&y<s) c.fillRect(Math.round(x*D)/D,Math.round(y*D)/D,dotSz,dotSz); };
      // darker dotted deflector L-brackets — translucent dark so it reads as a darker shade of any field colour
      c.fillStyle='rgba(46,34,52,0.30)';
      for(const [cnx,cny,dx,dy] of corners){
        const kx=cnx+dx*m, ky=cny+dy*m;              // kink, inset from the corner
        for(let a=0;a<=nLen;a++) for(let b=-nW;b<=nW;b++){
          dot(kx+dx*a*step, ky+b*step);              // horizontal arm (3 dots wide)
          dot(kx+b*step, ky+dy*a*step);              // vertical arm (3 dots wide)
        }
        dot(kx-dx*step, ky-dy*step);                 // fill the L's outer elbow corner (completes the 3×3 corner block)
      }
      // white dotted lines: cell borders + ONE diagonal through the empty corners (runs between the two L brackets)
      c.fillStyle='rgba(255,255,255,0.85)';
      for(let t=0;t<s;t+=step){ dot(t,0); dot(0,t); }              // top + left cell border (vertical + horizontal)
      for(let t=0;t<s;t+=step){ dot(t, diag==='main'?t:s-t); }     // single diagonal only — no center X
      c.restore();
    };
    const evenC=[TL,BR], oddC=[TR,BL];               // c+r even → LT/RB brackets (empty TR/BL → anti-diag); odd → RT/LB (empty TL/BR → main)
    cellTex(0,0,evenC,'anti'); cellTex(s,0,oddC,'main');
    cellTex(0,s,oddC,'main');  cellTex(s,s,evenC,'anti');
    fieldPattern=ctx.createPattern(t,'repeat');
    if(fieldPattern.setTransform){ fieldPattern.setTransform(new DOMMatrix([1/D,0,0,1/D,0,0])); }  // device-px tile -> CSS units
  }

  function drawBumper(gx, shape, perm, slotY){
    const gy=Math.ceil(slotY/2), x=G.originX+(gx-1)*G.cell, y=G.originY+(gy-1)*G.cell, s=G.cell;
    const corner=SHAPE_CORNER[shape]; let kx,ky,hx,vy;
    if(corner==='tl'){kx=x;ky=y;hx=1;vy=1;}
    else if(corner==='tr'){kx=x+s;ky=y;hx=-1;vy=1;}
    else if(corner==='bl'){kx=x;ky=y+s;hx=1;vy=-1;}
    else {kx=x+s;ky=y+s;hx=-1;vy=-1;}            // br
    const m=s*0.12, armLen=s*0.42;               // shortened so the square-cap white tip (armLen + 0.14s) lands at the old 0.56s end
    const ax=kx+hx*m, ay=ky+vy*m;
    const path=()=>{ ctx.beginPath(); ctx.moveTo(ax+hx*armLen, ay); ctx.lineTo(ax,ay); ctx.lineTo(ax, ay+vy*armLen); };
    ctx.save(); ctx.lineCap='square'; ctx.lineJoin='miter';   // square caps so the white edge wraps the arm tips too
    ctx.strokeStyle=COL.blueEdge; ctx.lineWidth=Math.max(4,s*0.28); path(); ctx.stroke();   // white edge all around
    ctx.strokeStyle=perm?COL.bumpDev:COL.bumpPlayer; ctx.lineWidth=Math.max(2,s*0.18); path(); ctx.stroke();
    ctx.restore();
  }
  function drawCup(c){
    const x=G.originX+(c.gx-1)*G.cell, y=G.originY+(c.gy-1)*G.cell, s=G.cell, cx=x+s/2, cy=y+s/2;
    const lw=Math.max(2,s*0.05), m=lw/2, wt=s*0.24, OL=x+m,OR=x+s-m,OT=y+m,OB=y+s-m;   // lw=outline; m sets the outer edge on the cell border so the cup fills its cell; wt=wall thickness
    // The original cup art: a white-outlined "U" with a two-tone body — dark royal blue on the left
    // wall + floor, a lighter periwinkle on the (lit) right wall. The 8-point outline traces both the
    // outer perimeter and the inner cavity at once. The whole sprite rotates a quarter-turn CW per face
    // (2=open right, 3=down, 4=left), like the original's spinning bitmap.
    const pts=[[OL,OT],[OL,OB],[OR,OB],[OR,OT],[OR-wt,OT],[OR-wt,OB-wt],[OL+wt,OB-wt],[OL+wt,OT]];
    const trace=()=>{ ctx.beginPath(); pts.forEach((q,i)=> i?ctx.lineTo(q[0],q[1]):ctx.moveTo(q[0],q[1])); ctx.closePath(); };
    const flashing = c.flashT && NOW-c.flashT < CUPFLASH_MS;                 // gold flash just after a catch
    const dark  = flashing?COL.cupFlash:COL.blue;
    const light = flashing?mixW(COL.cupFlash,0.45):mixW(COL.blue,0.58);      // the lit right face
    const edge  = flashing?'#fff3cf':COL.blueEdge;
    const rot={1:0,2:1,3:2,4:3}[c.face]||0;
    const rotating = c.beh===1||c.beh===2;
    const lx = c.beh===2 ? OL : OR-wt;     // lit wall marks the spin direction: CCW (beh 2) -> left, CW -> right
    ctx.save();
    ctx.translate(cx,cy); ctx.rotate(rot*Math.PI/2); ctx.translate(-cx,-cy);
    ctx.lineJoin='miter'; ctx.lineCap='square';
    ctx.fillStyle=dark;  trace(); ctx.fill();                                // dark body
    if(rotating){ ctx.fillStyle=light; ctx.fillRect(lx,OT,wt,OB-OT); }       // lit wall only on rotating cups, on the side they turn toward

    ctx.strokeStyle=edge; ctx.lineWidth=lw; trace(); ctx.stroke();           // white outline (outer + cavity)
    ctx.restore();
  }
  function drawBlock(gx,gy,br){
    const x=G.originX+(gx-1)*G.cell, y=G.originY+(gy-1)*G.cell, s=G.cell, pad=Math.max(1,s*0.06);
    ctx.save(); ctx.fillStyle=COL.blueEdge; ctx.fillRect(x+pad,y+pad,s-2*pad,s-2*pad);
    ctx.fillStyle=COL.blue; ctx.fillRect(x+pad+2,y+pad+2,s-2*pad-4,s-2*pad-4);
    if(br){ ctx.strokeStyle=COL.blueEdge; ctx.lineWidth=2; ctx.beginPath();
      ctx.moveTo(x+pad+3,y+s/2); ctx.lineTo(x+s-pad-3,y+s/2); ctx.stroke(); }
    ctx.restore();
  }
  function drawItem(it){
    const x=G.originX+(it.gx-1)*G.cell, y=G.originY+(it.gy-1)*G.cell, s=G.cell, cx=x+s/2, cy=y+s/2, sz=s*0.62, h=sz/2;
    const glyph={stik:'S',tele:'◈',invs:'?',redi:'⟳',spdu:'»',spdd:'«'}[it.it]||'•';
    const tint={stik:'#e6b53a',tele:'#3a9bd0',invs:'#8a6bd0',redi:'#d05a9a',spdu:'#3fae53',spdd:'#d0743a'}[it.it]||COL.blue;
    ctx.save(); ctx.fillStyle=COL.blueEdge; ctx.fillRect(cx-h-1,cy-h-1,sz+2,sz+2);
    ctx.fillStyle=tint; ctx.fillRect(cx-h,cy-h,sz,sz);
    ctx.fillStyle='#10243a'; ctx.font='700 '+Math.round(s*0.4)+'px -apple-system,Segoe UI,Roboto';
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(glyph,cx,cy+s*0.02); ctx.restore();
  }
  function drawBall(b){
    let px=SCx(b.x), py=SCy(b.y), sz=Math.round(G.cell*0.42), alpha=1;
    if(b.st==='invs') alpha=0.05;
    const h=sz/2; ctx.save(); ctx.globalAlpha=alpha;
    ctx.fillStyle=COL.blueEdge; ctx.fillRect(px-h-1,py-h-1,sz+2,sz+2);              // white border
    ctx.fillStyle = b.st==='stik' ? '#e6b53a' : b.col; ctx.fillRect(px-h,py-h,sz,sz);
    ctx.restore();
  }
  // Score readout: 5 pills = a 5-digit odometer (max 99999). Each pill always shows 9 GRAY slot
  // ticks (the capacity); the digit's value is drawn as WHITE ticks over the rightmost slots —
  // faithful to the original (gray = slots, white = score). Leftmost pill = ten-thousands.
  // Vertical geometry of the score strip, shared by drawFrame (which extends the board's framed
  // background down around it) and drawMeters (which draws the pills). Returns null if there's no room.
  function meterMetrics(){
    const by=G.originY, bh=G.cell*ROWS;
    const top=by+bh+Math.round(G.cell*0.40);
    const avail=window.innerHeight-top-46;
    const mh=Math.max(12,Math.min(Math.round(G.cell*0.46),avail));
    if(mh<10) return null;
    return { top, mh, bottom:top+mh };
  }
  function drawMeters(){
    const m=meterMetrics(); if(!m) return;
    const bx=G.originX, bw=G.cell*COLS, top=m.top, mh=m.mh;
    const n=5, gap=Math.max(9,Math.round(G.cell*0.34)), mw=(bw-gap*(n+1))/n;  // n+1 gaps: also inset from both side walls
    const digits=String(Math.min(99999,Math.max(0,G.score|0))).padStart(n,'0');
    const slots=9, span=mw*0.76, g=span/slots, x0=(mw-span)/2;          // centred 9-slot field
    const barW=Math.max(2,g*0.5), barTop=top+mh*0.22, barH=mh*0.56;
    const white=mixW(fieldCol(),0.6);                                   // same white as the board frame
    const cy=top+mh/2, linkH=Math.max(4,Math.round(mh*0.4));            // pill centre line, bridge thickness
    const px=i=>bx+gap+i*(mw+gap);                                      // first pill inset by one gap from the wall
    // a white rail behind the pills shows through the gaps as bridges, chaining the pills together and
    // out to the framed container's side walls (the board's frame, now extended down around the strip).
    ctx.save(); ctx.fillStyle=white; rrect(bx-8, cy-linkH/2, bw+16, linkH, linkH*0.45); ctx.fill(); ctx.restore();
    for(let i=0;i<n;i++){ const x=px(i), d=+digits[i];
      ctx.save();
      ctx.fillStyle=white; rrect(x-2,top-2,mw+4,mh+4,mh*0.5); ctx.fill();
      ctx.fillStyle=(i%2?COL.meterB:COL.meterA); rrect(x,top,mw,mh,mh*0.45); ctx.fill();
      for(let k=0;k<slots;k++){                                        // rightmost d ticks = white score, rest = gray slots
        ctx.fillStyle = (k>=slots-d) ? 'rgba(255,255,255,0.92)' : 'rgba(58,72,76,0.5)';
        ctx.fillRect(x+x0+k*g+(g-barW)/2, barTop, barW, barH);
      }
      ctx.restore();
    }
  }

  function drawFrame(){
    buildFieldTile();                                // rebuilds only when cell size or the 5-level field colour changes
    const W=window.innerWidth,H=window.innerHeight; ctx.clearRect(0,0,W,H);
    const bx=G.originX, by=G.originY, bw=G.cell*COLS, bh=G.cell*ROWS;
    // One framed container wraps the board AND the score strip: the textured field up top, then the
    // board-colour background flowing down around the pills, all inside the same outer + white frame.
    const fc=fieldCol(), frame=mixW(fc,0.6), outer=mixW(fc,0.2);
    const m=meterMetrics(), pad=Math.round(G.cell*0.16);
    const contBot = m ? m.bottom+pad : by+bh;        // container interior bottom (below the pills)
    const ih = contBot-by;                            // interior height: board + strip
    ctx.save(); ctx.fillStyle=outer; rrect(bx-14,by-14,bw+28,ih+28,12); ctx.fill();
    ctx.fillStyle=frame; rrect(bx-8,by-8,bw+16,ih+16,8); ctx.fill(); ctx.restore();
    ctx.save(); rrect(bx,by,bw,ih,3); ctx.clip();
    ctx.fillStyle=fc; ctx.fillRect(bx,by,bw,ih);                          // solid board colour fills the whole interior
    if(fieldPattern){ ctx.translate(bx,by); ctx.fillStyle=fieldPattern; ctx.fillRect(0,0,bw,bh); }  // texture only over the board
    ctx.restore();
    if(m){ ctx.fillStyle=frame; ctx.fillRect(bx-8, by+bh, bw+16, Math.max(3,Math.round(G.cell*0.12))); }  // white line dividing board from strip
    // static objects
    const drawnCell=new Set();
    for(let gy=1;gy<=ROWS;gy++) for(let gx=1;gx<=COLS;gx++){
      const top=slot(gx,2*gy-1), bot=slot(gx,2*gy), key=gx+','+gy, o=top||bot;
      if(o && (o.t==='cup'||o.t==='block'||o.t==='item') && !drawnCell.has(key)){ drawnCell.add(key);
        if(o.t==='cup') drawCup(o); else if(o.t==='block') drawBlock(gx,gy,o.br); else drawItem(o); }
      if(top && top.t==='bumper') drawBumper(gx,top.shape,top.perm,2*gy-1);
      if(bot && bot.t==='bumper') drawBumper(gx,bot.shape,bot.perm,2*gy);
    }
    if(G.hover && G.state==='playing'){ const pv=hoverShape(G.hover[0],G.hover[1],G.hoverFx);
      if(pv){ ctx.save(); ctx.globalAlpha=0.4; drawBumper(pv.gx,pv.shape,false,pv.slotY); ctx.restore(); } }
    if(G.flash && NOW-G.flash.t0<300){ ctx.save(); ctx.globalAlpha=0.5*(1-(NOW-G.flash.t0)/300);
      ctx.fillStyle=COL.danger; ctx.fillRect(G.originX+G.flash.c*G.cell,G.originY+G.flash.r*G.cell,G.cell,G.cell); ctx.restore(); }
    for(const b of G.balls) if(b.alive) drawBall(b);
    drawRing();
    // sparks (small light squares)
    for(const f of G.fx){ const a=(NOW-f.t0)/f.life; if(a>=1) continue; ctx.save(); ctx.globalAlpha=(1-a)*0.75;
      ctx.fillStyle='#ffffff'; const z=G.cell*0.08*(1+a); ctx.fillRect(SCx(f.x)-z,SCy(f.y)-z,z*2,z*2); ctx.restore(); }
    G.fx=G.fx.filter(f=>NOW-f.t0<f.life);
    drawMeters();
    if(G.introT && NOW-G.introT<1200){ const a=NOW-G.introT, fade=a<700?1:1-(a-700)/500;
      ctx.save(); ctx.globalAlpha=Math.max(0,fade); ctx.textAlign='center'; ctx.fillStyle=COL.blue;
      ctx.font='700 '+Math.round(G.cell*0.95)+'px -apple-system,Segoe UI,Roboto'; ctx.lineWidth=Math.max(2,G.cell*0.08);
      ctx.strokeStyle='#ffffff'; ctx.strokeText('Level '+levelLabel(), bx+bw/2, by+bh/2);
      ctx.fillText('Level '+levelLabel(), bx+bw/2, by+bh/2); ctx.restore(); }
  }
  function drawRing(){
    const p=Math.min(1,ringFrac()); const step=Math.min(13,Math.floor(p*13)); if(step<=0) return;
    const bx=G.originX, by=G.originY, bw=G.cell*COLS, bh=G.cell*ROWS, s=G.cell;
    // closing "wall": one 1-cell-thick frame that steps inward half a cell at a time (13 half-cells edge→center)
    const din=step*0.5, iIn=din*s, oIn=Math.max(0,(din-1)*s);   // inner / outer edge insets; band is one cell thick
    const x0=bx+oIn, y0=by+oIn, x1=bx+bw-oIn, y1=by+bh-oIn;     // outer rect of the ring
    const ix0=bx+iIn, iy0=by+iIn, ix1=bx+bw-iIn, iy1=by+bh-iIn; // inner rect of the ring
    ctx.save(); rrect(bx,by,bw,bh,3); ctx.clip();
    ctx.fillStyle=p>0.88?'rgba(150,46,66,0.30)':'rgba(34,28,46,0.26)';   // translucent gray (reddish near the very end)
    ctx.fillRect(x0,y0,x1-x0,iy0-y0); ctx.fillRect(x0,iy1,x1-x0,y1-iy1); // top + bottom bands (full width)
    ctx.fillRect(x0,iy0,ix0-x0,iy1-iy0); ctx.fillRect(ix1,iy0,x1-ix1,iy1-iy0); // left + right bands
    ctx.restore();
  }

  /* ============================ Placement (click-zone, ported createnew) ============================ */
  function hoverShape(c,r,fxy){           // c,r 0-based cell; fxy = [fieldX,fieldY] units
    if(!fxy) return null;
    const columex=c%2, columey=r%2, sx=fxy[0]%U, sy=fxy[1]%U; let shape,tag;
    if((columex===1&&columey===1)||(columex===0&&columey===0)){
      if(sy>U-sx){shape='RB';tag='bot';} else {shape='LT';tag='top';}
    } else { if(sy>sx){shape='LB';tag='bot';} else {shape='RT';tag='top';} }
    const gx=c+1, gy=r+1, slotY=tag==='top'?2*gy-1:2*gy;
    return {gx,gy,shape,slotY};
  }
  function placeAt(px,py){
    if(G.state!=='playing'&&G.state!=='paused') return;   // allow placing to resume a paused game
    const cell=pickCell(px,py); if(!cell) return;
    const fxX=(px-G.originX)/(G.cell/U), fxY=(py-G.originY)/(G.cell/U);
    const pv=hoverShape(cell[0],cell[1],[fxX,fxY]); if(!pv) return;
    if(slot(pv.gx,pv.slotY)){ G.flash={c:cell[0],r:cell[1],t0:NOW}; return; }
    if(G.placed>=G.supply){ G.flash={c:cell[0],r:cell[1],t0:NOW}; return; }
    setSlot(pv.gx,pv.slotY,{t:'bumper',shape:pv.shape,perm:false}); G.placed++;
    if(G.state==='paused') togglePause();                 // a successful placement unpauses
    Sound.place(); fx((pv.gx-1)*U+12,(pv.gy-1)*U+12,COL.bump,4); updateStatus();
  }
  function removeAt(px,py){
    if(G.state!=='playing') return;
    const cell=pickCell(px,py); if(!cell) return;
    const gx=cell[0]+1, gy=cell[1]+1;
    for(const sy of [2*gy-1,2*gy]){ const o=slot(gx,sy); if(o&&o.t==='bumper'&&!o.perm){
      setSlot(gx,sy,null); G.placed=Math.max(0,G.placed-1); Sound.remove(); updateStatus(); return; } }
  }

  /* ============================ Input ============================ */
  let downX=0,downY=0,downT=0,moved=false;
  cv.addEventListener('pointerdown',e=>{ Sound.init(); downX=e.clientX;downY=e.clientY;downT=performance.now();moved=false;
    try{cv.setPointerCapture(e.pointerId);}catch(_){} });
  cv.addEventListener('pointermove',e=>{ if(Math.abs(e.clientX-downX)>8||Math.abs(e.clientY-downY)>8) moved=true;
    G.hover=pickCell(e.clientX,e.clientY); G.hoverFx=[(e.clientX-G.originX)/(G.cell/U),(e.clientY-G.originY)/(G.cell/U)]; });
  cv.addEventListener('pointerup',e=>{ if(moved) return; const held=performance.now()-downT;
    if(e.button===2||held>500) removeAt(e.clientX,e.clientY); else placeAt(e.clientX,e.clientY); });
  cv.addEventListener('pointerleave',()=>{ G.hover=null; });
  cv.addEventListener('contextmenu',e=>{ e.preventDefault(); removeAt(e.clientX,e.clientY); });
  window.addEventListener('keydown',e=>{
    if(e.key==='p'||e.key==='P'){ if(G.state==='playing'||G.state==='paused') togglePause(); }
    if(e.key==='Enter'&&G.showCode) submitCode();
    if(e.key==='Escape'&&G.showCode){ G.showCode=false; updateStatus(); } });
  window.addEventListener('blur',()=>{ if(G.state==='playing') togglePause(); });
  window.addEventListener('resize',resize);

  /* ============================ Audio ============================ */
  const Sound=(function(){
    let ready=false,starting=false,master,blip,arp,poly,buzz,sp,lastB=0;
    async function init(){ if(ready||starting||!window.Tone) return; starting=true;
      try{ await Tone.start(); master=new Tone.Volume(-8).toDestination();
        blip=new Tone.MembraneSynth({pitchDecay:0.012,octaves:3,envelope:{attack:0.001,decay:0.12,sustain:0}}).connect(master);
        arp=new Tone.Synth({oscillator:{type:'triangle'},envelope:{attack:0.002,decay:0.16,sustain:0,release:0.05}}).connect(master);
        poly=new Tone.PolySynth(Tone.Synth).connect(new Tone.Volume(-6).connect(master));
        buzz=new Tone.Synth({oscillator:{type:'sawtooth'},envelope:{attack:0.005,decay:0.4,sustain:0.1,release:0.2}}).connect(new Tone.Volume(-8).connect(master));
        sp=new Tone.Synth({oscillator:{type:'square'},envelope:{attack:0.001,decay:0.1,sustain:0}}).connect(new Tone.Volume(-12).connect(master));
        ready=true;
      }catch(e){ starting=false; } }
    const on=()=>ready&&G.sound, T=()=>window.Tone?Tone.now():0;
    return { init,
      bounce(){ if(!on())return; const n=performance.now(); if(n-lastB<26)return; lastB=n; blip.triggerAttackRelease('C4','32n'); },
      score(){ if(!on())return; const t=T(); ['C5','E5','G5'].forEach((x,i)=>arp.triggerAttackRelease(x,'16n',t+i*0.05)); },
      win(){ if(!on())return; poly.triggerAttackRelease(['C4','E4','G4','C5'],'2n'); },
      lose(){ if(!on())return; const t=T(); buzz.triggerAttackRelease('G3','4n',t); buzz.triggerAttackRelease('C3','2n',t+0.12); },
      special(){ if(!on())return; sp.triggerAttackRelease('A4','32n'); },
      place(){ if(!on())return; blip.triggerAttackRelease('E3','32n'); },
      remove(){ if(!on())return; blip.triggerAttackRelease('A2','32n'); } };
  })();

  /* ============================ UI / overlays ============================ */
  const statusEl=document.getElementById('status'), hintEl=document.getElementById('hint');
  const startBtn=document.getElementById('startBtn'), pauseBtn=document.getElementById('pauseBtn');
  const resetBtn=document.getElementById('resetBtn');
  const levelsBtn=document.getElementById('levelsBtn'), soundBtn=document.getElementById('soundBtn'), ov=document.getElementById('ov');
  const helpBtn=document.getElementById('helpBtn'), copyBtn=document.getElementById('copyBtn');
  function secsLeft(){ return Math.max(0, Math.ceil((13*G.timerSpeed - G.timerVar)*FRAME_MS/1000)); }
  // display label for the current level: "TEST" for a level injected via the editor's #test= hook, else its number
  function levelLabel(){ const lv=LEVELS[G.level]; return (lv && lv.test) ? 'TEST' : (G.level+1); }
  function statusText(){
    const s=G.state;
    if(s==='menu') return ['Press Start',null];
    if(s==='playing'||s==='paused'){ let t=`Level ${levelLabel()} · Balls ${G.ballsLeft} · ${secsLeft()}s`;
      if(s==='paused') t+=' · PAUSED'; return [t, ringFrac()>0.8?'var(--danger)':null]; }
    if(s==='win') return ['Cleared!','var(--bump)'];
    if(s==='lose') return ['The ring closed in','var(--danger)']; return ['',null];
  }
  function updateStatus(){
    const playing=G.state==='playing'||G.state==='paused';
    startBtn.textContent=playing?'Restart':'Start';
    pauseBtn.style.display=playing?'':'none'; pauseBtn.textContent=G.state==='paused'?'Resume':'Pause';
    soundBtn.classList.toggle('active',G.sound); soundBtn.textContent=G.sound?'🔊 Sound':'🔇 Sound';
    const [txt,col]=statusText(); statusEl.textContent=txt; statusEl.style.color=col||'#e8ecf5';
    hintEl.textContent = (playing && LEVELS[G.level] && LEVELS[G.level].pw) ? `Password: ${LEVELS[G.level].pw}` : '';
    copyBtn.style.display = (LEVELS[G.level] && LEVELS[G.level].test) ? '' : 'none';   // only while play-testing an editor #test= level
    renderOverlay();
  }
  const HOW_ITEMS=[
    ['◣','#caa6b6','Drop a corner','Click a cell to drop a corner deflector — click near a side of the cell to choose its angle.'],
    ['◉','#ff5cc8','Reach the cups','Bend every ball into a cup before the ring closes in.'],
    ['✕','#ff3344','Clear a corner','Right-click or long-press removes a corner. Each corner vanishes after one hit.'],
  ];
  const HELP_ITEMS=[
    ['S','#e6b53a','Stick','freezes the ball in place for a moment, then it carries on.'],
    ['◈','#3a9bd0','Teleport','warps the ball across to the paired teleport pad.'],
    ['?','#8a6bd0','Invisible','the ball nearly vanishes for a few seconds — track it from memory.'],
    ['⟳','#d05a9a','Redirect','knocks the ball onto a new, random direction.'],
    ['»','#3fae53','Speed Up','bumps the ball up to a faster speed tier.'],
    ['«','#d0743a','Speed Down','drops the ball down to a slower speed tier.'],
  ];
  function renderOverlay(){
    const s=G.state; let html='';
    if(G.showHelp){
      const li=([g,c,nm,ds])=>`<li><span class="ic" style="color:${c}">${g}</span><span><b>${nm}</b> — ${ds}</span></li>`;
      const howRows=HOW_ITEMS.map(li).join('');
      const rows=HELP_ITEMS.map(li).join('');
      html=`<div class="panel"><h2>How to Play</h2>
        <ul class="help">${howRows}</ul>
        <h3>Power-ups — run a moving ball over an item to trigger it</h3>
        <ul class="help">${rows}</ul><div class="row"><button data-act="closehelp">Got it</button></div></div>`;
    } else if(G.showCode){ html=`<div class="panel"><h3>Enter a Password</h3>
      <input id="codeInput" maxlength="5" placeholder="" autocomplete="off" autocorrect="off" spellcheck="false">
      <div class="row"><button data-act="code">Go</button><button data-act="closecode">Cancel</button></div>
      <div class="err2" id="codeErr"></div></div>`;
    } else if(s==='menu'){ html=`<div class="panel"><h2>BLiX</h2>
      <p>The original Shockwave puzzle game, faithfully recreated — ${LEVELS.length} real levels. Drop corner deflectors to bend every ball into a cup before the ring closes in. Corners are single-use.</p>
      <div class="row"><button data-act="start">Start</button><button data-act="opencode">Password</button></div></div>`;
    } else if(s==='win'){ const nx=G.level+1;
      const codeLine=(LEVELS[nx]&&LEVELS[nx].pw)?`<p class="code">Password for level ${nx+1}: <b>${LEVELS[nx].pw}</b></p>`:'';
      const bonusLine=G.winBonus>0?`<p>Time Bonus: <b>+${G.winBonus}</b></p>`:'';
      html=`<div class="panel"><h2>Level ${levelLabel()} Cleared!</h2>${bonusLine}${codeLine}<div class="row"><button data-act="next">Next Level →</button></div></div>`;
    } else if(s==='lose'){ html=`<div class="panel"><h2>Out of Time</h2><p>The ring reached the center. Route every ball into a cup before it closes.</p>
      <div class="row"><button data-act="retry">Retry</button><button data-act="menu">Menu</button></div></div>`; }
    if(html){ ov.innerHTML=html; ov.style.display='grid'; const ci=document.getElementById('codeInput'); if(ci) ci.focus(); }
    else { ov.style.display='none'; ov.innerHTML=''; }
  }
  function submitCode(){ const ci=document.getElementById('codeInput'); if(!ci) return;
    const i=PASSWORDS.indexOf(ci.value.trim().toLowerCase());
    if(i>=0){ const idx=i*5; setMax(idx); G.showCode=false; loadLevel(idx); }
    else { const er=document.getElementById('codeErr'); if(er) er.textContent='Unknown password.'; } }
  ov.addEventListener('click',e=>{ const act=e.target.dataset.act; if(!act) return; Sound.init();
    if(act==='start') startGame(); else if(act==='next') nextLevel(); else if(act==='retry') loadLevel(G.level);
    else if(act==='menu') gotoMenu(); else if(act==='opencode'){G.showCode=true;updateStatus();}
    else if(act==='closecode'){G.showCode=false;updateStatus();} else if(act==='code') submitCode();
    else if(act==='closehelp'){G.showHelp=false;updateStatus();} });
  startBtn.addEventListener('click',()=>{ Sound.init(); if(G.state==='playing'||G.state==='paused') loadLevel(G.level); else startGame(); });
  pauseBtn.addEventListener('click',()=>{ Sound.init(); togglePause(); });
  resetBtn.addEventListener('click',()=>{ Sound.init(); setScore(0); loadLevel(0); });   // jump back to the first level, fresh score
  levelsBtn.addEventListener('click',()=>{ Sound.init(); if(G.state==='playing') togglePause(); G.showCode=true; updateStatus(); });
  helpBtn.addEventListener('click',()=>{ Sound.init(); if(G.state==='playing') togglePause(); G.showHelp=true; updateStatus(); });
  soundBtn.addEventListener('click',()=>setSound(!G.sound));
  copyBtn.addEventListener('click',async()=>{                       // copy the loaded level back out as compact JSON
    const lv=LEVELS[G.level]; if(!lv) return;
    const {test,...data}=lv;                                        // strip the internal play-test flag
    const json=JSON.stringify(data);
    let ok=false;
    try{ await navigator.clipboard.writeText(json); ok=true; }catch(e){}
    if(!ok){                                                        // clipboard API blocked (iframe/file://) — fall back to execCommand
      try{ const ta=document.createElement('textarea'); ta.value=json; ta.style.position='fixed'; ta.style.opacity='0';
           document.body.appendChild(ta); ta.select(); ok=document.execCommand('copy'); document.body.removeChild(ta); }catch(e){}
    }
    copyBtn.textContent = ok ? '✓ Copied!' : '⧉ Copy failed';
    setTimeout(()=>{ copyBtn.textContent='⧉ Copy Level Data'; },1300);
    if(!ok) prompt('Copy the level data:', json);                   // last resort: show it for manual copy
  });

  /* ============================ Main loop ============================ */
  let lastNow=performance.now(), acc=0;
  function frame(){
    NOW=performance.now(); let dt=NOW-lastNow; lastNow=NOW; if(dt>200)dt=200; acc+=dt;
    while(acc>=FRAME_MS){ tickFrame(); acc-=FRAME_MS; if(G.state!=='playing') { acc=0; break; } }
    if(G.bonus) tickBonus(dt);                  // count leftover time into the score after a clear
    resize(); drawFrame();
    // keep the status clock ticking while playing
    if(G.state==='playing'){ const [txt,col]=statusText(); statusEl.textContent=txt; statusEl.style.color=col||'#e8ecf5'; }
    requestAnimationFrame(frame);
  }
  (function boot(){
    try{ const m=parseInt(localStorage.getItem('blix.max')||'0',10); if(!isNaN(m)) G.maxLevel=m;
      const sc=parseInt(localStorage.getItem('blix.score')||'0',10); if(!isNaN(sc)) G.score=sc;
      const ss=localStorage.getItem('blix.sound'); if(ss!==null) G.sound=ss==='1'; }catch(e){}
    resize(); G.state='menu'; updateStatus(); requestAnimationFrame(frame);
    // Level-editor bridge: editor.html opens index.html#test=<base64 level> to play-test a level.
    // Push it as a one-off level and load it, then restore blix.cur so saved progress is untouched.
    try{ const h=location.hash||'';
      if(h.indexOf('#test=')===0){
        const prevCur=localStorage.getItem('blix.cur');
        const lv=JSON.parse(decodeURIComponent(escape(atob(h.slice(6)))));
        if(lv && Array.isArray(lv.o)){ lv.test=true; LEVELS.push(lv); loadLevel(LEVELS.length-1);
          if(prevCur!==null) localStorage.setItem('blix.cur',prevCur); else localStorage.removeItem('blix.cur'); }
      } }catch(e){}
    // Autoplay policy: the audio engine can only start inside a user gesture,
    // so arm a one-time listener that boots it on first interaction when sound is on.
    const armAudio=()=>{ if(G.sound) Sound.init();
      window.removeEventListener('pointerdown',armAudio); window.removeEventListener('keydown',armAudio); };
    window.addEventListener('pointerdown',armAudio); window.addEventListener('keydown',armAudio);
  })();
  </script>
</body>
